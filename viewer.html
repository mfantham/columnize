<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Columnize</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        box-sizing: border-box;
        overflow-x: auto;
        overflow-y: hidden;
        scroll-behavior: smooth;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #layout {
        display: flex;
        flex-direction: column;
        width: max-content;
        min-width: 100vw;
        height: 100vh;
      }

      #toolbar {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.35rem 0.6rem;
        border-bottom: 1px solid #e5e5e5;
        background: #fff;
        font-size: 0.8rem;
        white-space: nowrap;
      }

      #toolbar label {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
      }

      #toolbar input[type="text"] {
        width: 5rem;
      }

      #toolbar input[type="number"] {
        width: 3.8rem;
      }

      #countdown {
        color: #555;
      }

      #countdown[hidden] {
        display: none;
      }

      pre {
        box-sizing: border-box;
        margin: 0;
        padding: 1rem;
        height: 100%;
        min-height: 0;
        column-width: 80ch;
        column-gap: 2rem;
        column-fill: auto;
        column-rule: 1px solid #d0d0d0;
        width: max-content;
        min-width: 100vw;
        white-space: pre;
      }

      .chunk {
        display: block;
        break-inside: avoid;
      }
    </style>
  </head>
  <body>
    <div id="layout">
      <div id="toolbar">
        <label>Break on: <input id="breakOn" type="text" value="\n\n" /></label>
        <label><input id="columnDelineation" type="checkbox" checked /> Column delineation</label>
        <label><input id="autoScrollEnabled" type="checkbox" /> Autoscroll after</label>
        <label><input id="autoScrollSeconds" type="number" min="1" step="1" value="8" /> s</label>
        <span id="countdown" hidden></span>
      </div>
      <pre id="text"></pre>
    </div>
    <script src="viewer.js"></script>
  </body>
</html>
