<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Columnize</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        overflow-x: auto;
        overflow-y: hidden;
        scroll-behavior: smooth;
      }

      pre {
        box-sizing: border-box;
        margin: 0;
        padding: 1rem;
        height: 100vh;
        column-width: 80ch;
        column-gap: 2rem;
        column-fill: auto;
        width: max-content;
        min-width: 100vw;
        white-space: pre;
      }

      .chunk {
        display: block;
        break-inside: avoid;
      }
    </style>
  </head>
  <body>
    <pre id="text"></pre>
    <script src="viewer.js"></script>
  </body>
</html>
